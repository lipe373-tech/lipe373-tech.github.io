<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Amanda Pinheiro · Financeiro</title>
<meta name="theme-color" content="#8A4B41">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="AP Financeiro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --terra:#8A4B41;
  --terra-dark:#743D34;
  --terra-deep:#5F332B;
  --rose:#EDCFC6;
  --rose-soft:#F5E4DD;
  --cream:#FBF5F1;
  --bg:#F4E9E3;
  --ink:#3E2B26;
  --ink-soft:#7A5F58;
  --green:#6F8F6B;
  --green-bg:#E7EEE4;
  --red:#B04A38;
  --red-bg:#F6DDD6;
  --amber:#B98A3C;
  --amber-bg:#F3E8D3;
  --radius:16px;
  --shadow:0 4px 18px rgba(95,51,43,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:15px;color:var(--ink)}

/* ---------- LOGIN ---------- */
.loginwrap{position:fixed;inset:0;background:var(--terra);display:flex;align-items:center;justify-content:center;z-index:100}
.logincard{width:380px;max-width:92vw;text-align:center}
.logincard .monogram{font-family:'Playfair Display',Georgia,serif;font-size:110px;line-height:.9;color:var(--rose);letter-spacing:-20px;position:relative;display:inline-block}
.logincard .lname{font-size:12px;letter-spacing:6px;color:var(--rose);margin-top:4px}
.logincard .lsub{font-size:10px;letter-spacing:4px;color:rgba(237,207,198,.55);margin:10px 0 34px}
.logincard input{width:100%;padding:14px 18px;border:none;border-radius:12px;background:rgba(251,245,241,.96);margin-bottom:12px;outline:none;font-size:15px}
.logincard input:focus{box-shadow:0 0 0 2.5px var(--rose)}
.logincard .entrar{width:100%;padding:14px;border:none;border-radius:12px;background:var(--rose);color:var(--terra-deep);font-size:15.5px;font-weight:600;letter-spacing:1px;margin-top:6px;transition:.18s}
.logincard .entrar:hover{background:#fff}
.logincard .entrar:disabled{opacity:.6;cursor:wait}
.loginerr{background:rgba(0,0,0,.18);color:#FFD9CE;border-radius:10px;padding:10px 14px;font-size:13.5px;margin-bottom:12px;display:none}
.loginerr.show{display:block}
.forgot{display:inline-block;margin-top:18px;color:rgba(237,207,198,.75);font-size:13px;background:none;border:none;text-decoration:underline}
.forgot:hover{color:var(--rose)}
.setupbox{background:rgba(251,245,241,.97);border-radius:16px;padding:26px 28px;text-align:left;color:var(--ink);font-size:14px;line-height:1.55}
.setupbox h2{font-family:'Playfair Display',serif;color:var(--terra-deep);font-size:20px;margin-bottom:10px}
.setupbox code{background:var(--rose-soft);padding:1px 6px;border-radius:6px;font-size:12.5px}

/* ---------- APP SHELL ---------- */
#appShell{display:none}
#appShell.on{display:flex}
.sidebar{width:250px;background:var(--terra);color:var(--rose);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:10}
.logo{padding:38px 0 26px;text-align:center;position:relative}
.monogram{font-family:'Playfair Display',Georgia,serif;font-size:78px;line-height:.9;color:var(--rose);letter-spacing:-14px;position:relative;display:inline-block}
.monogram .p{margin-left:2px}
.logoname{position:absolute;left:0;right:0;top:88px;font-size:10.5px;letter-spacing:5px;font-weight:400;color:var(--rose);text-shadow:0 0 6px var(--terra),0 0 10px var(--terra)}
.logosub{margin-top:14px;font-size:10px;letter-spacing:4px;color:rgba(237,207,198,.6)}
.nav{flex:1;padding:22px 14px;display:flex;flex-direction:column;gap:4px}
.nav button{display:flex;align-items:center;gap:12px;width:100%;padding:11px 16px;border:none;background:transparent;color:rgba(237,207,198,.78);font-size:14.5px;letter-spacing:.6px;border-radius:10px;transition:.18s;text-align:left}
.nav button svg{width:18px;height:18px;flex:none}
.nav button:hover{background:rgba(237,207,198,.1);color:var(--rose)}
.nav button.active{background:var(--rose);color:var(--terra-dark);font-weight:500}
.nav .navbadge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;padding:1px 7px;border-radius:99px}
.nav button.active .navbadge{background:var(--terra)}
.sidesearch{padding:0 12px 10px}
.sidesearch input{width:100%;padding:9px 12px;border:none;border-radius:10px;background:rgba(237,207,198,.14);color:var(--rose);font-size:13px;outline:none}
.sidesearch input::placeholder{color:rgba(237,207,198,.55)}
.sidesearch input:focus{background:rgba(237,207,198,.22)}
.sidefoot{padding:14px 18px 18px;font-size:11px;letter-spacing:1px;color:rgba(237,207,198,.45);text-align:center}
.sidefoot .sync{display:block;margin-bottom:8px;font-size:11px;letter-spacing:.5px;min-height:14px}
.sidefoot .sync.ok{color:rgba(237,207,198,.7)}
.sidefoot .sync.err{color:#FFB4A0}
.sairbtn{background:none;border:1px solid rgba(237,207,198,.35);color:rgba(237,207,198,.75);border-radius:99px;padding:5px 16px;font-size:12px;letter-spacing:1px;margin-bottom:10px}
.sairbtn:hover{border-color:var(--rose);color:var(--rose)}

/* ---------- MAIN ---------- */
.main{margin-left:250px;flex:1;padding:34px 42px;max-width:1250px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:26px}
.topbar h1{font-family:'Playfair Display',serif;font-weight:500;font-size:30px;color:var(--terra-deep)}
.topbar .sub{font-size:14px;color:var(--ink-soft);margin-top:3px}
.btn{border:none;border-radius:99px;padding:11px 22px;font-size:14.5px;letter-spacing:.4px;transition:.18s}
.btn-primary{background:var(--terra);color:var(--rose)}
.btn-primary:hover{background:var(--terra-dark)}
.btn-ghost{background:transparent;color:var(--terra);border:1.5px solid var(--terra)}
.btn-ghost:hover{background:var(--rose-soft)}
.btn-sm{padding:6px 14px;font-size:13px}

/* ---------- CARDS ---------- */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.card{background:var(--cream);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow)}
.card .lbl{font-size:12.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
.card .val{font-family:'Playfair Display',serif;font-size:27px;font-weight:500;color:var(--terra-deep)}
.card .val.pos{color:var(--green)}
.card .val.neg{color:var(--red)}
.card .note{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.card .note b{color:var(--red)}

.panelrow{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:24px}
.panel{background:var(--cream);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow)}
.panel h3{font-family:'Playfair Display',serif;font-weight:500;font-size:18px;color:var(--terra-deep);margin-bottom:16px}
.chartbox{position:relative;height:260px}

/* ---------- TABLES ---------- */
table{width:100%;border-collapse:collapse}
th{font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);font-weight:500;text-align:left;padding:10px 12px;border-bottom:1.5px solid var(--rose)}
td{padding:12px;font-size:14.5px;border-bottom:1px solid var(--rose-soft)}
tr:hover td{background:rgba(237,207,198,.18)}
td.money{font-weight:500;white-space:nowrap}
td .desc-sub{font-size:12px;color:var(--ink-soft)}
.pill{display:inline-block;padding:3px 12px;border-radius:99px;font-size:12.5px;font-weight:500}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.bad{background:var(--red-bg);color:var(--red)}
.rowbtn{border:none;background:transparent;color:var(--ink-soft);font-size:15px;padding:4px 7px;border-radius:7px}
.rowbtn:hover{background:var(--rose);color:var(--terra-dark)}
.empty{padding:40px;text-align:center;color:var(--ink-soft);font-size:15px}

/* ---------- FILTERS ---------- */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:9px 14px;border:1.5px solid var(--rose);border-radius:10px;background:var(--cream);outline:none}
.filters select:focus,.filters input:focus{border-color:var(--terra)}

/* ---------- LISTS ---------- */
.duelist{display:flex;flex-direction:column;gap:10px}
.dueitem{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg);border-radius:12px}
.dueitem .dot{width:9px;height:9px;border-radius:50%;flex:none}
.dueitem .who{flex:1;min-width:0}
.dueitem .who .n{font-size:14.5px;font-weight:500}
.dueitem .who .d{font-size:12px;color:var(--ink-soft)}
.dueitem .amt{font-weight:600;font-size:14.5px;color:var(--terra-deep);white-space:nowrap}

.ranklist .rk{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--rose-soft)}
.ranklist .rk:last-child{border:none}
.ranklist .bar{height:7px;border-radius:99px;background:var(--terra);opacity:.85}
.ranklist .nm{width:130px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ranklist .vl{margin-left:auto;font-size:13.5px;font-weight:500;color:var(--terra-deep);white-space:nowrap}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(62,43,38,.45);display:none;align-items:center;justify-content:center;z-index:50}
.overlay.open{display:flex}
.modal{background:var(--cream);border-radius:20px;padding:30px 32px;width:460px;max-width:92vw;max-height:90vh;overflow:auto}
.modal h2{font-family:'Playfair Display',serif;font-weight:500;font-size:22px;color:var(--terra-deep);margin-bottom:20px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--rose);border-radius:10px;background:#fff;outline:none}
.field input:focus,.field select:focus{border-color:var(--terra)}
.fieldrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modalbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;flex-wrap:wrap}
.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--rose);border-radius:10px;background:#fff;outline:none;font-family:inherit;font-size:14.5px;min-height:70px;resize:vertical}
.field textarea:focus{border-color:var(--terra)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1.5px dashed var(--terra);background:transparent;color:var(--terra);border-radius:99px;padding:5px 12px;font-size:12.5px}
.chip:hover{background:var(--rose-soft)}
.chipchk{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--rose);border-radius:99px;padding:5px 12px;font-size:12.5px;background:#fff;cursor:pointer;color:var(--ink)}
.chipchk input{width:auto!important;accent-color:var(--terra);margin:0}
.chipchk:has(input:checked){background:var(--rose-soft);border-color:var(--terra);color:var(--terra-dark)}
.prop-item{display:flex;gap:7px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.prop-item input,.prop-item select{padding:9px 10px;border:1.5px solid var(--rose);border-radius:9px;background:#fff;outline:none;font-size:13.5px}
.prop-item input:focus,.prop-item select:focus{border-color:var(--terra)}
.prop-item .pi-nome{flex:1;min-width:130px}
.prop-item .pi-valor{width:95px}
.prop-item .pi-tipo{width:95px}
.prop-item .pi-x{border:none;background:transparent;color:var(--red);font-size:16px;padding:4px 6px;border-radius:7px}
.prop-item .pi-x:hover{background:var(--red-bg)}
.prop-item .pi-det{width:100%;padding:9px 11px;border:1.5px solid var(--rose);border-radius:9px;font-family:inherit;font-size:12.5px;resize:vertical;background:#fff;outline:none;min-height:100px;line-height:1.5}
.prop-item .pi-det:focus{border-color:var(--terra)}
.as-wrap{width:100%;background:var(--rose-soft);border-radius:9px;padding:9px 12px;font-size:12.5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--terra-dark)}
.as-wrap label{display:flex;align-items:center;gap:5px}
.as-wrap input[type=number]{width:52px;padding:4px 6px;border:1.5px solid var(--rose);border-radius:7px;background:#fff;outline:none;font-size:12.5px}
.as-wrap .as-chk input{width:auto;accent-color:var(--terra)}
.as-wrap .as-sep{font-weight:500}

/* ---------- REPORT ---------- */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.repline{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--rose-soft);font-size:15px}
.repline:last-child{border:none}
.repline .v{font-weight:600}
.repline.total{font-size:17px}
.repline.total .v{font-family:'Playfair Display',serif;font-size:20px}
.taxbox{background:var(--rose-soft);border-radius:12px;padding:16px 18px;margin-top:14px}
.taxbox .t{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--terra-dark);margin-bottom:4px}
.taxbox .v{font-family:'Playfair Display',serif;font-size:24px;color:var(--terra-deep)}
.taxbox .cfg{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.taxbox input{width:56px;padding:3px 8px;border:1.5px solid var(--rose);border-radius:8px;background:#fff;outline:none}

.samplebar{background:var(--amber-bg);color:var(--amber);border-radius:12px;padding:10px 18px;font-size:13.5px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
.samplebar button{border:none;background:var(--amber);color:#fff;border-radius:99px;padding:5px 14px;font-size:12.5px}

/* ---------- CARTÕES DE CLIENTE ---------- */
.clientgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.clientcard{background:var(--cream);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.clientcard .cc-top{display:flex;align-items:flex-start;gap:8px}
.clientcard .cc-nome{font-family:'Playfair Display',serif;font-size:19px;color:var(--terra-deep);flex:1;line-height:1.25}
.clientcard .cc-acoes{display:flex;gap:2px;flex:none}
.clientcard .cc-serv{font-size:13.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45}
.clientcard .cc-valor{font-family:'Playfair Display',serif;font-size:26px;color:var(--terra);margin-top:14px}
.clientcard .cc-valor span{font-family:'Jost';font-size:13px;color:var(--ink-soft);margin-left:2px}
.clientcard .cc-status{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.clientcard .cc-dia{font-size:12.5px;color:var(--ink-soft)}
.clientcard .cc-foot{display:flex;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--rose-soft)}
.clientcard .cc-foot div{flex:1}
.clientcard .cc-foot span{display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft)}
.clientcard .cc-foot b{font-size:15px;color:var(--terra-deep);font-weight:600}
.clientcard.inativo{opacity:.72;background:var(--bg)}
.clientcard.inativo .cc-valor{color:var(--ink-soft)}

.nav .mobileonly{display:none!important}
.mtopbar{display:none}
@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.panelrow,.report-grid{grid-template-columns:1fr}}
@media(max-width:800px){
  /* ---------- BARRA SUPERIOR (app bar) ---------- */
  .mtopbar{display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;height:calc(56px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 18px 0;background:var(--terra);color:var(--rose);z-index:45;box-shadow:0 2px 12px rgba(95,51,43,.22)}
  .mtopbar .mono{font-family:'Playfair Display',serif;font-size:30px;letter-spacing:-6px;line-height:1;flex:none}
  .mtopbar .mono .p{margin-left:1px}
  .mtopbar .mt-title{flex:1;font-size:16px;letter-spacing:.4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mtopbar .mt-sync{font-size:13px;opacity:.8;flex:none}
  .mtopbar .mt-sync.err{color:#FFB4A0;opacity:1}
  .mtopbar .mt-searchbtn{flex:none;background:none;border:none;color:var(--rose);font-size:17px;padding:2px 4px}
  .mtopbar .mt-search{display:none;flex:1;border:none;border-radius:9px;padding:8px 12px;background:rgba(255,255,255,.92);color:var(--ink);font-size:15px;outline:none}
  .mtopbar.searching .mt-title{display:none}
  .mtopbar.searching .mt-search{display:block}
  .mtopbar.searching .mono{display:none}

  /* ---------- MENU INFERIOR ---------- */
  .sidebar{top:auto;bottom:0;width:100%;height:calc(62px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);flex-direction:row;align-items:stretch;background:var(--terra);box-shadow:0 -3px 16px rgba(95,51,43,.28);z-index:40}
  .logo,.sidefoot,.sidesearch{display:none}
  .nav{flex-direction:row;padding:6px 6px;gap:2px;overflow-x:auto;align-items:center;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity}
  .nav::-webkit-scrollbar{display:none}
  .nav button{position:relative;flex:none;width:60px;flex-direction:column;gap:3px;padding:6px 4px;font-size:8.5px;letter-spacing:.2px;border-radius:12px;justify-content:center;align-items:center;text-align:center;color:rgba(237,207,198,.7);scroll-snap-align:center}
  .nav button span{max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}
  .nav button svg{width:21px;height:21px}
  .nav button.active{background:var(--rose);color:var(--terra-dark);font-weight:600}
  .nav .navbadge{position:absolute;top:2px;right:8px;margin:0;font-size:9px;padding:0 5px;line-height:15px;min-width:15px}
  .nav .mobileonly{display:flex!important}

  .main{margin-left:0;padding:calc(66px + env(safe-area-inset-top)) 14px calc(80px + env(safe-area-inset-bottom));max-width:100%}
  .topbar{flex-direction:column;align-items:stretch;gap:12px;margin-bottom:18px}
  .topbar h1{font-size:24px}
  .topbar .btn-primary{width:100%;text-align:center}
  .cards{grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
  .card{padding:15px 16px;border-radius:14px}
  .card .lbl{font-size:11px;letter-spacing:1.2px}
  .card .val{font-size:21px}
  .panel{padding:17px 16px;overflow:visible;border-radius:16px;margin-bottom:14px}
  .panel h3{font-size:16.5px;margin-bottom:13px}
  .topbar .btn-ghost,.topbar select{width:100%;text-align:center}
  .topbar>div:last-child{display:flex;flex-direction:column;gap:8px;width:100%}
  .topbar>div:last-child .btn,.topbar>div:last-child select{width:100%}

  /* Tabelas viram cartões empilhados */
  table{min-width:0;font-size:14px}
  thead{display:none}
  tbody,tr,td{display:block;width:100%}
  tr{background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  tr:hover td{background:transparent}
  td{border:none;padding:5px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:right}
  td:before{content:attr(data-label);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-soft);text-align:left;flex:none;max-width:45%}
  td:not([data-label]):before{display:none}
  td:empty{display:none}
  td:first-child{font-size:15.5px;padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--rose)}
  td .desc-sub{text-align:right}
  td:last-child{justify-content:flex-end;gap:6px;padding-top:10px;margin-top:6px;border-top:1px solid var(--rose-soft)}
  td:last-child .rowbtn{background:var(--rose-soft);border-radius:9px;min-width:42px}

  .modal{padding:22px 18px 26px;width:100%!important;max-width:100%;max-height:92vh;border-radius:22px 22px 0 0;position:fixed;bottom:0;left:0;right:0}
  .overlay{align-items:flex-end}
  .fieldrow{grid-template-columns:1fr}
  .field input,.field select,.field textarea{font-size:16px;padding:13px 14px}
  .btn{padding:13px 22px}
  .btn-sm{padding:9px 16px}
  .rowbtn{font-size:18px;padding:7px 10px}
  .modalbtns{gap:8px}

function setSync(txt,cls){const el=document.getElementById('syncStatus');if(el){el.textContent=txt;el.className='sync '+(cls||'');}

async function loadData(){
  const snap=await getDoc(doc(db,'financeiro',currentUser.uid));
  if(snap.exists()){state=snap.data();}
  else{state=seed();await persist();}
  // garante estruturas mínimas
  ['entradas','saidas','contas','fornecedores','clientes','contratos','propostas'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});

  if(gerarRecorrentes())await persist();
}

/* ---------- RECORRENTES: gera mensalidades e contas fixas na virada do mês ---------- */
function gerarRecorrentes(){
  const y=thisYM();
  if(state.config.lastGen===y)return false;
  let n=0;
  // mensalidades dos clientes com valor mensal
  state.clientes.filter(c=>c.valorMensal>0&&c.status!=='inativo').forEach(c=>{
    const ja=state.entradas.some(e=>e.clienteId===c.id&&ym(e.data)===y&&e.descricao==='Mensalidade');
    if(!ja){
      const dia=Math.min(c.diaCobranca||5,28);
      const dataE=y+'-'+String(dia).padStart(2,'0');
      state.entradas.push({id:uid(),data:dataE,descricao:'Mensalidade',clienteId:c.id,categoria:c.categoria||'Gestão de redes',valor:c.valorMensal,status:'a_receber',semNota:!!c.semNota,prevista:dataE,formaPgto:'Pix'});
      n++;
    }
  });
  // contas marcadas como "repetir todo mês": clona a mais recente de cada
  const grupos={};
  state.contas.filter(c=>c.recorrente).forEach(c=>{
    const k=(c.fornecedorId||'')+'|'+c.descricao;
    if(!grupos[k]||c.vencimento>grupos[k].vencimento)grupos[k]=c;
  });
  Object.values(grupos).forEach(m=>{
    if(ym(m.vencimento)>=y)return;
    const dia=Math.min(parseInt(m.vencimento.slice(8,10),10)||10,28);
    state.contas.push({id:uid(),fornecedorId:m.fornecedorId,descricao:m.descricao,valor:m.valor,vencimento:y+'-'+String(dia).padStart(2,'0'),status:'pendente',recorrente:true});
    n++;
  });
  state.config.lastGen=y;
  return true;
}

function buscaTituloHTML(){

function buscaResultadosHTML(){

  if(q.length<2)return `<div class="panel"><div class="empty">Digite ao menos 2 letras. Busque por descrição, cliente, categoria ou valor.</div></div>`;
  const match=t=>String(t||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').includes(q);
  const ents=state.entradas.filter(e=>match(e.descricao)||match(cliName(e.clienteId))||match(e.categoria)||match(String(e.valor))).sort((a,b)=>b.data.localeCompare(a.data));

  const tE=ents.reduce((a,b)=>a+b.valor,0),tS=sais.reduce((a,b)=>a+b.valor,0);
  const linhaE=e=>`<tr><td>${fdate(e.data)}</td><td>${esc(e.descricao)}</td><td>${esc(cliName(e.clienteId))}</td><td>${esc(e.categoria)}</td><td class="money" style="color:var(--green)">+ ${fmt(e.valor)}</td><td>${e.status==='recebido'?'<span class="pill ok">Recebido</span>':'<span class="pill warn">A receber</span>'}</td></tr>`;

  ${clis.length?`<div class="panel"><h3>Clientes (${clis.length})</h3><div class="clientgrid" style="margin-top:4px">${clis.map(c=>`<div class="clientcard" onclick="go('clientes')" style="cursor:pointer"><div class="cc-nome">${esc(c.nome)}</div><div class="cc-serv">${esc(c.servico||'')}</div><div class="cc-valor">${c.valorMensal?fmt(c.valorMensal)+'<span>/mês</span>':'—'}</div></div>`).join('')}</div></div>`:''}

  ${sais.length?`<div class="panel"><h3>Saídas (${sais.length}) · ${fmt(tS)}</h3><table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th></tr></thead><tbody>${sais.slice(0,100).map(linhaS).join('')}</tbody></table></div>`:''}

/* No celular as tabelas viram cartões: copia o cabeçalho para cada célula */
function rotularCelulas(){
  document.querySelectorAll('#main table').forEach(t=>{
    const heads=[...t.querySelectorAll('thead th')].map(h=>h.textContent.trim());
    t.querySelectorAll('tbody tr').forEach(tr=>{
      [...tr.children].forEach((td,i)=>{
        if(heads[i])td.setAttribute('data-label',heads[i]);
        else td.removeAttribute('data-label');
      });
    });
  });
}

async function loadXLSX(){
  if(window.XLSX)return;
  await new Promise((ok,err)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=ok;s.onerror=()=>err(new Error('Não foi possível baixar o gerador de Excel. Verifique a internet.'));document.head.appendChild(s);});
}
async function exportExcel(){
  try{await loadXLSX();}catch(e){alert(e.message);return;}
  const wb=XLSX.utils.book_new();
  const add=(nome,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.length?rows:[{Aviso:'Sem registros'}]),nome);
  add('Entradas',state.entradas.map(e=>({Data:fdate(e.data),'Descrição':e.descricao,Cliente:cliName(e.clienteId),Categoria:e.categoria,'Valor (R$)':e.valor,Status:e.status==='recebido'?'Recebido':'A receber','Forma':e.formaPgto||'','Prevista para':e.prevista?fdate(e.prevista):'','Nota fiscal':e.semNota?'Não':'Sim'})));
  add('Saídas',state.saidas.map(s=>({Data:fdate(s.data),'Descrição':s.descricao,Fornecedor:fornName(s.fornecedorId),Categoria:s.categoria,'Valor (R$)':s.valor})));
  add('Contas a pagar',state.contas.map(c=>({Vencimento:fdate(c.vencimento),Fornecedor:fornName(c.fornecedorId),'Descrição':c.descricao,'Valor (R$)':c.valor,Status:contaStatus(c)==='pago'?'Paga':contaStatus(c)==='atrasado'?'Atrasada':'Pendente','Paga em':c.pagoEm?fdate(c.pagoEm):''})));
  add('Fornecedores',state.fornecedores.map(f=>({Nome:f.nome,'Serviço':f.servico,Contato:f.contato})));
  add('Clientes',state.clientes.map(c=>({Nome:c.nome,'Serviços':c.servico,'Valor mensal (R$)':c.valorMensal||'','Dia de cobrança':c.valorMensal?(c.diaCobranca||5):'','Situação':c.status==='inativo'?'Inativo':'Ativo','Cliente desde':c.desde?fdate(c.desde):'','Saiu em':c.saidaEm?fdate(c.saidaEm):'','Nota fiscal':c.semNota?'Não':'Sim'})));
  add('Contratos',state.contratos.map(c=>({Cliente:cliName(c.clienteId),'Contrato':c.titulo,'Valor (R$)':c.valor,Tipo:c.periodicidade==='projeto'?'Projeto único':'Mensal','Início':fdate(c.inicio),'Término':c.fim?fdate(c.fim):'','Status':c.status,'Obs':c.obs||''})));
  add('Propostas',state.propostas.map(p=>{const t=propTotais(p);return {Data:fdate(p.data),Cliente:p.nome,'Serviços':p.itens.map(i=>i.nome).join(', '),'Mensal (R$)':t.mensal||'','Único (R$)':t.unico||'','Desconto (R$)':p.desconto||'','Válida até':p.validade?fdate(p.validade):'',Status:p.status};}));
  XLSX.writeFile(wb,'backup-financeiro-'+today()+'.xlsx');
}
function restoreBackup(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const j=JSON.parse(r.result);
      const d=j.dados||j;
      if(!Array.isArray(d.entradas)||!Array.isArray(d.saidas))throw new Error('estrutura inválida');
      if(!confirm('Restaurar este backup vai SUBSTITUIR todos os dados atuais pelos do arquivo'+(j.geradoEm?' (gerado em '+fdate(j.geradoEm.slice(0,10))+')':'')+'. Continuar?'))return;
      state=d;
      ['entradas','saidas','contas','fornecedores','clientes','contratos','propostas'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});
      if(!state.config)state.config={taxPct:6,sample:false};
      save();closeModal();render();
      alert('Backup restaurado com sucesso!');
    }catch(e){alert('Arquivo de backup inválido: '+e.message);}
  };
  r.readAsText(file);
}

  const labels=months.map(y=>{const[a,b]=y.split('-');return new Date(a,b-1,1).toLocaleDateString('pt-BR',{month:'short'});});
  const din=months.map(y=>state.entradas.filter(e=>ym(e.data)===y&&e.status==='recebido').reduce((a,b)=>a+b.valor,0));
  const dout=months.map(y=>sumMonth(state.saidas,y));
  Chart.defaults.font.family='Jost';Chart.defaults.color='#7A5F58';
  charts.flux=new Chart(document.getElementById('chFlux'),{type:'bar',
    data:{labels,datasets:[
      {label:'Entradas',data:din,backgroundColor:'#8A4B41',borderRadius:6,barPercentage:.55},
      {label:'Saídas',data:dout,backgroundColor:'#EDCFC6',borderRadius:6,barPercentage:.55}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle'}}},
      scales:{y:{grid:{color:'rgba(138,75,65,.08)'},ticks:{callback:v=>'R$ '+(v/1000)+'k'}},x:{grid:{display:false}}}}});
  const y=thisYM();const byCat={};
  state.saidas.filter(s=>ym(s.data)===y).forEach(s=>{byCat[s.categoria]=(byCat[s.categoria]||0)+s.valor;});
  const cats=Object.keys(byCat);
  const palette=['#8A4B41','#B4776B','#EDCFC6','#D9A79A','#5F332B','#C89185','#A05F52'];
  if(cats.length){
    charts.cat=new Chart(document.getElementById('chCat'),{type:'doughnut',
      data:{labels:cats,datasets:[{data:cats.map(c=>byCat[c]),backgroundColor:palette,borderColor:'#FBF5F1',borderWidth:3}]},
      options:{maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:8,font:{size:12}}}}}});
  }else{
    document.getElementById('chCat').replaceWith(Object.assign(document.createElement('div'),{className:'empty',textContent:'Sem saídas este mês'}));
  }
  const byF={};
  state.entradas.filter(e=>ym(e.data)===y&&e.status==='recebido').forEach(e=>{const f=e.formaPgto||'Não informado';byF[f]=(byF[f]||0)+e.valor;});
  const fEl=document.getElementById('chFormas');
  if(fEl){
    const fk=Object.keys(byF);
    if(fk.length){
      charts.formas=new Chart(fEl,{type:'doughnut',
        data:{labels:fk,datasets:[{data:fk.map(k=>byF[k]),backgroundColor:palette,borderColor:'#FBF5F1',borderWidth:3}]},
        options:{maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:8,font:{size:12}}}}}});
    }else{
      fEl.replaceWith(Object.assign(document.createElement('div'),{className:'empty',textContent:'Sem recebimentos este mês'}));
    }
  }
}

  const c=state.contas.find(x=>x.id===id);if(!c)return;

  state.saidas.push({id:uid(),data:today(),descricao:c.descricao,fornecedorId:c.fornecedorId,categoria:'Fornecedores',valor:c.valor});
  save();render();

function viewClientes(){
  const ano=new Date().getFullYear()+'';

  });
  const statusMes=c=>{
    const ents=state.entradas.filter(e=>e.clienteId===c.id&&ym(e.data)===y);
    if(!ents.length)return c.valorMensal?{t:'Sem lançamento no mês',cls:'warn'}:null;
    if(ents.every(e=>e.status==='recebido'))return {t:'Recebido este mês',cls:'ok'};
    const atrasada=ents.some(e=>e.status==='a_receber'&&e.prevista&&e.prevista<today());
    return atrasada?{t:'Pagamento atrasado',cls:'bad'}:{t:'A receber este mês',cls:'warn'};
  };

  const ativos=state.clientes.filter(ativo);
  const inativos=state.clientes.filter(c=>!ativo(c));
  // atendidos no ano: teve lançamento no ano, ou entrou/saiu dentro do ano, ou está ativo
  const noAnoAtendidos=state.clientes.filter(c=>
    (noAno[c.id]>0)||ativo(c)||(c.saidaEm&&c.saidaEm.slice(0,4)===ano)||(c.desde&&c.desde.slice(0,4)===ano)
  ).length;
  const entraram=state.clientes.filter(c=>c.desde&&c.desde.slice(0,4)===ano).length;
  const sairam=state.clientes.filter(c=>c.saidaEm&&c.saidaEm.slice(0,4)===ano).length;

  if(cliFiltro==='ativos')lista=lista.filter(ativo);
  if(cliFiltro==='inativos')lista=lista.filter(c=>!ativo(c));
  lista.sort((a,b)=>(ativo(b)-ativo(a))||((b.valorMensal||0)-(a.valorMensal||0)));
  return `
  <div class="topbar"><div><h1>Clientes</h1><div class="sub">${ativos.length} ativo(s) · ${fmt(mrr)}/mês recorrente</div></div>
    <button class="btn btn-primary" onclick="openForm('cliente')">+ Novo cliente</button></div>
  <div class="cards" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">

    <div class="card"><div class="lbl">Atendidos em ${ano}</div><div class="val">${noAnoAtendidos}</div><div class="note">no ano todo</div></div>
    <div class="card"><div class="lbl">Entraram em ${ano}</div><div class="val" style="color:var(--terra)">${entraram}</div></div>
    <div class="card"><div class="lbl">Sairam em ${ano}</div><div class="val ${sairam?'neg':''}">${sairam}</div></div>
  </div>
  <div class="filters">
    <select onchange="setCliFiltro(this.value)">
      <option value="ativos" ${cliFiltro==='ativos'?'selected':''}>Somente ativos (${ativos.length})</option>
      <option value="inativos" ${cliFiltro==='inativos'?'selected':''}>Somente inativos (${inativos.length})</option>
      <option value="todos" ${cliFiltro==='todos'?'selected':''}>Todos (${state.clientes.length})</option>
    </select>
  </div>
  ${lista.length?`<div class="clientgrid">${lista.map(c=>{
    const st=ativo(c)?statusMes(c):null;
    return `<div class="clientcard${ativo(c)?'':' inativo'}">
      <div class="cc-top">
        <div class="cc-nome">${esc(c.nome)}${ativo(c)?'':' <span class="pill bad" style="font-size:10.5px">inativo</span>'}${c.semNota?' <span class="pill" style="background:var(--rose-soft);color:var(--terra-dark);font-size:10.5px">s/ nota</span>':''}</div>
        <div class="cc-acoes"><button class="rowbtn" onclick="openForm('cliente','${c.id}')">✎</button><button class="rowbtn" onclick="del('clientes','${c.id}')">🗑</button></div>
      </div>
      ${c.servico?`<div class="cc-serv">${esc(c.servico)}</div>`:''}
      <div class="cc-valor">${c.valorMensal?fmt(c.valorMensal)+'<span>/mês</span>':'<span style="font-size:14px;color:var(--ink-soft)">sem mensalidade fixa</span>'}</div>
      ${st?`<div class="cc-status"><span class="pill ${st.cls}">${st.t}</span>${c.valorMensal?`<span class="cc-dia">vence dia ${c.diaCobranca||5}</span>`:''}</div>`:''}
      <div class="cc-foot">
        <div><span>Recebido em ${ano}</span><b>${fmt(noAno[c.id]||0)}</b></div>

 'Gestão de redes sociais':{

 }

function regenDet(el){
  const row=el.closest('.prop-item');
  const svc=row.dataset.svc;
  if(!svc||!ASSISTENTES[svc])return;
  const t=row.querySelector('.pi-det');
  t.value=ASSISTENTES[svc].gerar(row);
  t.style.display='block';
}
function durTxt(p){
  if(!p.duracao)return'';
  const u={semanas:['semana','semanas'],meses:['mês','meses'],anos:['ano','anos']}[p.duracaoUn||'meses'];
  return p.duracao+' '+(p.duracao===1?u[0]:u[1]);

function salvarProposta(id,gerar){

    detalhes:r.querySelector('.pi-det').value.trim()
  })).filter(i=>i.nome&&i.valor>0);

  const obj={
    nome,contato:document.getElementById('pr_contato').value.trim(),
    itens,desconto:parseFloat(document.getElementById('pr_desc').value)||0,

  if(gerar)gerarPropostaPDF(pid);
}

/* ---------- META DO ANO ---------- */
function metaAno(){return state.config.metaAno!=null?state.config.metaAno:360000;}
function setMetaAno(v){state.config.metaAno=parseFloat(v)||0;save();render();}
function metaPorMes(){
  const ano=new Date().getFullYear();
  return Array.from({length:12},(_,i)=>{
    const y=ano+'-'+String(i+1).padStart(2,'0');
    return state.entradas.filter(e=>ym(e.data)===y&&e.status==='recebido').reduce((a,b)=>a+b.valor,0);
  });
}
function viewMeta(){
  const ano=new Date().getFullYear();
  const meta=metaAno();
  const porMes=metaPorMes();
  const total=porMes.reduce((a,b)=>a+b,0);
  const falta=Math.max(meta-total,0);
  const pct=meta>0?Math.min(total/meta*100,100):0;
  const mesesPassados=new Date().getMonth()+1;
  const mediaAtual=total/mesesPassados;
  const mesesRestantes=12-mesesPassados;
  const ritmo=mesesRestantes>0?falta/mesesRestantes:0;
  const batida=total>=meta&&meta>0;
  return `
  <div class="topbar"><div><h1>Meta do Ano · ${ano}</h1><div class="sub">${batida?'Meta batida! 🎉 Parabéns!':'Acompanhe o faturamento rumo à meta'}</div></div></div>
  <div class="cards">
    <div class="card"><div class="lbl">Faturado em ${ano}</div><div class="val pos">${fmt(total)}</div><div class="note">média de ${fmt(mediaAtual)}/mês até agora</div></div>
    <div class="card"><div class="lbl">Meta anual</div><div class="val">${fmt(meta)}</div><div class="note">editar: R$ <input type="number" min="0" step="1000" value="${meta}" onchange="setMetaAno(this.value)" style="width:110px;padding:3px 8px;border:1.5px solid var(--rose);border-radius:8px;background:#fff;outline:none;font-size:12.5px"></div></div>
    <div class="card"><div class="lbl">Falta para a meta</div><div class="val ${batida?'pos':'neg'}">${batida?'—':fmt(falta)}</div><div class="note">${batida?'objetivo alcançado ✓':mesesRestantes>0?'precisa de '+fmt(ritmo)+'/mês até dezembro':'último mês do ano'}</div></div>
    <div class="card"><div class="lbl">Atingido</div>
      <div style="position:relative;height:92px;margin-top:2px">
        <canvas id="chMetaPie"></canvas>
        <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;color:var(--terra-deep);pointer-events:none">${pct.toFixed(1).replace('.',',')}%</span>
      </div>
    </div>
  </div>
  <div class="panel" style="margin-bottom:24px;padding:16px 22px">
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;flex-wrap:wrap;gap:6px"><span>Progresso da meta</span><span><b style="color:var(--terra-deep)">${fmt(total)}</b> de ${fmt(meta)}</span></div>
    <div style="background:var(--bg);border-radius:99px;height:12px;overflow:hidden">
      <div style="width:${pct}%;background:linear-gradient(90deg,var(--terra),#B4776B);height:100%;border-radius:99px"></div>
    </div>
  </div>
  <div class="panel"><h3>Faturamento mês a mês × ritmo da meta</h3><div class="chartbox" style="height:300px"><canvas id="chMeta"></canvas></div></div>`;
}
function drawMetaChart(){
  const meta=metaAno();
  const porMes=metaPorMes();
  const el=document.getElementById('chMeta');if(!el)return;
  Chart.defaults.font.family='Jost';Chart.defaults.color='#7A5F58';
  const totalAno=porMes.reduce((a,b)=>a+b,0);

    ]},

/* ---------- FECHAMENTO ANUAL ---------- */
let anualAno=new Date().getFullYear();
function setAnualAno(v){anualAno=parseInt(v);render();}
function dadosAnuais(ano){
  const ent=Array(12).fill(0),sai=Array(12).fill(0),imp=Array(12).fill(0);
  let prolabore=0;
  state.entradas.filter(e=>e.status==='recebido'&&+e.data.slice(0,4)===ano).forEach(e=>{ent[+e.data.slice(5,7)-1]+=e.valor;});
  state.saidas.filter(s=>+s.data.slice(0,4)===ano).forEach(s=>{const m=+s.data.slice(5,7)-1;sai[m]+=s.valor;if(s.categoria==='Impostos')imp[m]+=s.valor;if(s.categoria==='Pró-labore')prolabore+=s.valor;});
  return {ent,sai,imp,prolabore};
}
function viewAnual(){
  const anos=[...new Set([...state.entradas.map(e=>+e.data.slice(0,4)),...state.saidas.map(s=>+s.data.slice(0,4)),new Date().getFullYear()])].sort((a,b)=>b-a);
  if(!anos.includes(anualAno))anualAno=anos[0];
  const d=dadosAnuais(anualAno);
  const totalEnt=d.ent.reduce((a,b)=>a+b,0);
  const totalSai=d.sai.reduce((a,b)=>a+b,0);
  const totalImp=d.imp.reduce((a,b)=>a+b,0);
  const lucro=totalEnt-totalSai;
  const mesesComDados=d.ent.filter(v=>v>0).length||1;
  const media=totalEnt/mesesComDados;
  const nomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let melhor={v:-1,m:0},pior={v:Infinity,m:0};
  d.ent.forEach((v,i)=>{if(v>0){if(v>melhor.v)melhor={v,m:i};if(v<pior.v)pior={v,m:i};}});
  // crescimento: compara com ano anterior
  const dAnt=dadosAnuais(anualAno-1);
  const totalAnt=dAnt.ent.reduce((a,b)=>a+b,0);
  const cresc=totalAnt>0?((totalEnt-totalAnt)/totalAnt*100):null;
  // ranking clientes
  const rec={};
  state.entradas.filter(e=>e.status==='recebido'&&+e.data.slice(0,4)===anualAno&&e.clienteId).forEach(e=>{rec[e.clienteId]=(rec[e.clienteId]||0)+e.valor;});
  const top=Object.entries(rec).sort((a,b)=>b[1]-a[1]).slice(0,8);

function calcPrec(saveTax){
  const gv2=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};
  const v=gv2('p_valor'),tax=gv2('p_tax'),custo=gv2('p_custo'),alvo=gv2('p_alvo');
  if(saveTax){state.config.simTax=tax;save();}
  const imp=v*tax/100,liq=v-imp-custo;
  const set=(id,txt,cor)=>{const el=document.getElementById(id);if(el){el.textContent=txt;if(cor)el.style.color=cor;}};
  set('p_imp',v?('− '+fmt(imp)):'—');
  set('p_cus',v?('− '+fmt(custo)):'—');
  set('p_liq',v?fmt(liq):'—',liq>=0?'var(--green)':'var(--red)');
  set('p_mar',v?((liq/v*100).toFixed(1).replace('.',',')+'%'):'—',liq>=0?'var(--green)':'var(--red)');
  const cobrar=tax<100?(alvo+custo)/(1-tax/100):0;
  set('p_cobrar',alvo?fmt(cobrar):'—','var(--terra-deep)');
}

function gerarRelatorio(scope,fiscal){

  const ents=state.entradas.filter(e=>inPeriod(e.data)&&(modoFiscal?!e.semNota:true)&&(modoSem?e.semNota:true)).sort((a,b)=>a.data.localeCompare(b.data));
  const sais=(modoSem?[]:state.saidas.filter(s=>inPeriod(s.data))).sort((a,b)=>a.data.localeCompare(b.data));
  const entRec=ents.filter(e=>e.status==='recebido').reduce((a,b)=>a+b.valor,0);
  const entPend=ents.filter(e=>e.status==='a_receber').reduce((a,b)=>a+b.valor,0);
  const saiTot=sais.reduce((a,b)=>a+b.valor,0);
  const resultado=entRec-saiTot;
  const reserva=entRec*state.config.taxPct/100;
  const abertas=modoSem?[]:state.contas.filter(c=>c.status!=='pago').sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  const periodo=(isMes?monthName(relMes):'Geral — todas as movimentações')+(modoFiscal?' · somente lançamentos com nota fiscal':modoSem?' · somente sem nota fiscal (controle interno)':'');
  const byCat=(list,key)=>{const o={};list.forEach(x=>{o[x[key]]=(o[x[key]]||0)+x.valor;});return Object.entries(o).sort((a,b)=>b[1]-a[1]);};
  const catIn=byCat(ents.filter(e=>e.status==='recebido'),'categoria');
  const catOut=byCat(sais,'categoria');

  const rows=(list,isIn)=>list.map(x=>`<tr>
    <td>${fdate(x.data)}</td><td>${esc(x.descricao)}</td>
    <td>${isIn?esc(cliName(x.clienteId)):esc(fornName(x.fornecedorId))}</td>
    <td>${esc(x.categoria)}</td>
    <td class="r ${isIn?'g':'d'}">${isIn?'+':'−'} ${fmt(x.valor)}</td></tr>`).join('');

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório · Amanda Pinheiro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--terra:#8A4B41;--deep:#5F332B;--rose:#EDCFC6;--soft:#F5E4DD;--ink:#3E2B26;--muted:#7A5F58;--green:#6F8F6B;--red:#B04A38}
    *{margin:0;padding:0;box-sizing:border-box}

  </style></head><body>

    <div class="sum"><div class="l">Total do período</div><div class="v">${fmt(entRec+entPend)}</div></div>

    <div class="sum"><div class="l">Entradas recebidas</div><div class="v g">${fmt(entRec)}</div></div>

    ${modoFiscal?'':`<div class="sum"><div class="l">Reserva impostos (${state.config.taxPct}%)</div><div class="v">${fmt(reserva)}</div></div>`}
  </div>
  ${entPend?`<p style="margin-top:10px;color:var(--muted)">Além disso, há <b>${fmt(entPend)}</b> em entradas ainda a receber no período.</p>`:''}`}
  <div class="cols">
    <div><h2>Entradas por categoria</h2>${catIn.length?catIn.map(([c,v])=>`<div class="catrow"><span>${esc(c)}</span><b style="color:var(--green)">${fmt(v)}</b></div>`).join(''):'<div class="empty">Sem entradas no período.</div>'}</div>

  w.document.write(html);w.document.close();
}

function drawRelCharts(){
  const entRec=state.entradas.filter(e=>ym(e.data)===relMes&&e.status==='recebido').reduce((a,b)=>a+b.valor,0);
  const sai=sumMonth(state.saidas,relMes);
  const reserva=entRec*state.config.taxPct/100;
  const livre=Math.max(entRec-sai-reserva,0);
  const el=document.getElementById('chRel');if(!el)return;
  if(entRec===0&&sai===0){el.replaceWith(Object.assign(document.createElement('div'),{className:'empty',textContent:'Sem dados'}));return;}
  charts.rel=new Chart(el,{type:'doughnut',
    data:{labels:['Custos','Reserva impostos','Livre'],datasets:[{data:[sai,reserva,livre],backgroundColor:['#8A4B41','#D9A79A','#EDCFC6'],borderColor:'#FBF5F1',borderWidth:3}]},
    options:{maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:8}}}}});
}

function del(coll,id){
  if(!confirm('Excluir este registro?'))return;
  state[coll]=state[coll].filter(x=>x.id!==id);save();render();
}

function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal').style.width='';}
function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function submitForm(type,id){
  const num=v=>parseFloat(v)||0;
  if(type==='entrada'||type==='saida'||type==='conta'||type==='contrato'){
    if(!gv('f_desc')){alert('Preencha a descrição.');return;}
    if(num(gv('f_valor'))<=0){alert('Informe um valor maior que zero.');return;}
  }
  if((type==='fornecedor'||type==='cliente')&&!gv('f_nome')){alert('Preencha o nome.');return;}
  if(type==='entrada'){
    const obj={data:gv('f_data')||today(),descricao:gv('f_desc'),clienteId:gv('f_cli')||null,categoria:gv('f_cat'),valor:num(gv('f_valor')),status:gv('f_st'),semNota:document.getElementById('f_semnota').checked,formaPgto:gv('f_fp'),prevista:gv('f_prev')||null};
    if(id){Object.assign(state.entradas.find(x=>x.id===id),obj);}else{state.entradas.push({id:uid(),...obj});}
  }
  if(type==='saida'){
    const obj={data:gv('f_data')||today(),descricao:gv('f_desc'),fornecedorId:gv('f_forn')||null,categoria:gv('f_cat'),valor:num(gv('f_valor'))};
    if(id){Object.assign(state.saidas.find(x=>x.id===id),obj);}else{state.saidas.push({id:uid(),...obj});}
  }
  if(type==='conta'){
    const obj={descricao:gv('f_desc'),fornecedorId:gv('f_forn')||null,valor:num(gv('f_valor')),vencimento:gv('f_venc')||today(),recorrente:document.getElementById('f_crec').checked};
    if(id){Object.assign(state.contas.find(x=>x.id===id),obj);}else{state.contas.push({id:uid(),status:'pendente',...obj});}
  }
  if(type==='contrato'){
    const obj={clienteId:gv('f_cli')||null,titulo:gv('f_desc'),valor:num(gv('f_valor')),periodicidade:gv('f_per'),inicio:gv('f_ini')||today(),fim:gv('f_fim')||null,status:gv('f_st2'),obs:gv('f_obs')};
    if(id){Object.assign(state.contratos.find(x=>x.id===id),obj);}else{state.contratos.push({id:uid(),...obj});}
  }
  if(type==='fornecedor'){
    const obj={nome:gv('f_nome'),servico:gv('f_serv'),contato:gv('f_cont')};
    if(id){Object.assign(state.fornecedores.find(x=>x.id===id),obj);}else{state.fornecedores.push({id:uid(),...obj});}
  }
  if(type==='cliente'){
    const marcados=[...document.querySelectorAll('#f_svcbox input:checked')].map(x=>x.value);
    const extras=gv('f_servx').split(',').map(s=>s.trim()).filter(Boolean);
    const servicos=[...marcados,...extras];
    const st=gv('f_cst')||'ativo';
    const obj={nome:gv('f_nome'),servicos,servico:servicos.join(', '),valorMensal:num(gv('f_vm')),diaCobranca:Math.min(Math.max(parseInt(gv('f_dia'))||5,1),28),categoria:gv('f_ccat')||'Gestão de redes',semNota:document.getElementById('f_csn').checked,status:st,desde:gv('f_cini')||null,saidaEm:st==='inativo'?(gv('f_cfim')||today()):null};
    if(id){Object.assign(state.clientes.find(x=>x.id===id),obj);}else{state.clientes.push({id:uid(),...obj});}
  }
  save();closeModal();render();
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
